name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install fastapi uvicorn httpx sgp4 websockets
      - name: Ruff lint
        run: ruff check server.py --select E,F,W --ignore E501
      - name: Ruff format check
        run: ruff format --check server.py || true
      - name: Syntax check
        run: python -c "import py_compile; py_compile.compile('server.py', doraise=True)"

  test:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn httpx sgp4 websockets httpx[http2]
          pip install pytest pytest-asyncio
      - name: Start server
        run: |
          uvicorn server:app --host 0.0.0.0 --port 8090 &
          sleep 10
        env:
          AIS_API_KEY: ""
      - name: Test health
        run: |
          curl -sf http://localhost:8090/ > /dev/null
          echo "✅ Frontend loads"
      - name: Test API endpoints
        run: |
          set -e
          # Core endpoints
          curl -sf http://localhost:8090/api/stats | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'uptime' in d or True; print('✅ /api/stats')"
          curl -sf http://localhost:8090/api/flights | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'flights' in d; print(f'✅ /api/flights ({d[\"count\"]} flights)')"
          curl -sf http://localhost:8090/api/satellites/all?limit=10 | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'satellites' in d; print(f'✅ /api/satellites ({d[\"count\"]} sats)')"
          curl -sf http://localhost:8090/api/satellite-groups | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'groups' in d; print('✅ /api/satellite-groups')"
          
          # Environment
          curl -sf http://localhost:8090/api/earthquakes | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'earthquakes' in d; print(f'✅ /api/earthquakes ({d[\"count\"]})')"
          curl -sf http://localhost:8090/api/gps-jamming | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'zones' in d; print(f'✅ /api/gps-jamming ({d[\"count\"]} zones)')"
          curl -sf http://localhost:8090/api/squawk-alerts | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'alerts' in d; print('✅ /api/squawk-alerts')"
          
          # Data sources
          curl -sf http://localhost:8090/api/webcams | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'webcams' in d; print(f'✅ /api/webcams ({d[\"count\"]})')"
          curl -sf http://localhost:8090/api/bikes | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'✅ /api/bikes ({d.get(\"count\",0)})')" || echo "⚠️ /api/bikes (external API may be slow)"
          
          echo ""
          echo "🎯 All API tests passed!"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install bandit safety
      - name: Bandit security scan
        run: bandit -r server.py -ll --skip B101,B608 || true
      - name: Check for hardcoded secrets
        run: |
          # Check no API keys are hardcoded
          if grep -P '(api[_-]?key|token|secret)\s*=\s*"[a-zA-Z0-9_-]{20,}"' server.py; then
            echo "❌ Found potential hardcoded secrets!"
            exit 1
          else
            echo "✅ No hardcoded secrets found"
          fi

  html-validate:
    name: Frontend Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check HTML structure
        run: |
          # Basic HTML validation
          python3 -c "
          with open('static/index.html') as f:
              c = f.read()
          opens = c.count('{')
          closes = c.count('}')
          assert opens == closes, f'Bracket mismatch: {{ {opens} vs }} {closes}'
          assert '<html' in c, 'Missing html tag'
          assert '</html>' in c, 'Missing closing html tag'
          assert 'Cesium' in c, 'Missing Cesium reference'
          print(f'✅ HTML valid ({len(c)} chars, {opens} bracket pairs)')
          "
      - name: Check JS syntax
        run: |
          # Extract and validate JS doesn't have obvious issues
          python3 -c "
          with open('static/index.html') as f:
              c = f.read()
          # Count function definitions
          import re
          funcs = re.findall(r'(?:async\s+)?function\s+(\w+)', c)
          print(f'✅ {len(funcs)} JS functions found')
          for f in sorted(set(funcs)):
              print(f'   - {f}()')
          "
